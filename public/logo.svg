<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Fondo blanco -->
  <rect width="400" height="120" fill="white"/>

  <!-- Texto principal ACCIDENTALEX -->
  <text x="20" y="55" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="#4a9999" letter-spacing="2">
    ACCIDENTALEX
  </text>

  <!-- Línea decorativa -->
  <line x1="20" y1="65" x2="320" y2="65" stroke="#4a9999" stroke-width="1.5"/>

  <!-- Subtítulo -->
  <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#666" letter-spacing="2">
    ABOGADOS ESPECIALIZADOS EN ACCIDENTES
  </text>
</svg>